<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Player Studio - Video.js v10</title>
    
    <!-- Tailwind CSS for Workspace Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Video.js HTML Custom Elements (v10) -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Studio layout dynamically injected here -->
    <div id="studio-mount"></div>

    <!-- Production-Ready Application Logic -->
    <script src="studio.js"></script>
    <script>
        // Mount the consolidated studio.js template synchronously from script memory
        document.addEventListener('DOMContentLoaded', () => {
            if (window.PlayerStudio && window.PlayerStudio.TEMPLATE) {
                document.getElementById('studio-mount').innerHTML = window.PlayerStudio.TEMPLATE;
                
                window.App = new window.PlayerStudio();
                window.App.init();
            } else {
                console.error("PlayerStudio template failed to load.");
            }
        });
    </script>
</body>
</html>
